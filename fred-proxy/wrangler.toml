name = "fred-proxy"
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

[[kv_namespaces]]
binding = "USAGE_KV"
id = "REPLACE_WITH_YOUR_KV_ID"
preview_id = "REPLACE_WITH_YOUR_PREVIEW_KV_ID"

[vars]
WEEKLY_LIMIT = "5"

# Secrets (set via: wrangler secret put OPENAI_API_KEY)
# OPENAI_API_KEY
# FRED_SECRET
